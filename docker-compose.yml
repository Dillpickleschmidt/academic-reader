services:
  convex:
    image: ghcr.io/get-convex/convex-backend:latest
    network_mode: host
    environment:
      INSTANCE_NAME: ${CONVEX_INSTANCE_NAME}
      INSTANCE_SECRET: ${CONVEX_INSTANCE_SECRET}
      CONVEX_CLOUD_ORIGIN: ${CONVEX_URL}
      CONVEX_SITE_ORIGIN: ${VITE_CONVEX_SITE_URL}
      DO_NOT_REQUIRE_SSL: "true"
      DISABLE_BEACON: "true"
    volumes:
      - ./convex-data:/convex/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 2s
      timeout: 2s
      retries: 30

  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    network_mode: host
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: ${CONVEX_URL}
    depends_on:
      convex:
        condition: service_healthy

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${SITE_URL}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 30

  marker:
    build: ./workers/marker
    env_file:
      - .env.local
    network_mode: host
    command: uvicorn app.main:app --host 0.0.0.0 --port 8800
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  kokoro-tts:
    build:
      context: .
      dockerfile: workers/kokoro-tts/Dockerfile
    network_mode: host
    command: uvicorn app.main:app --host 0.0.0.0 --port 8801
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qwen3-tts:
    build:
      context: .
      dockerfile: workers/qwen3-tts/Dockerfile
    network_mode: host
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c '
      mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" &&
      mc mb --ignore-existing "local/${S3_BUCKET}"
      '
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      SITE_URL: ${SITE_URL}
