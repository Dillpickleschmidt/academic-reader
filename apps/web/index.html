
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Reader</title>
    <script>
      // Apply the saved theme and mode before first paint to avoid a flash.
      // Values are applied raw; color-theme.ts validates and corrects them on
      // hydration, and an unknown theme attribute just falls back to :root.
      (() => {
        var theme = null;
        var mode = null;
        try {
          theme = localStorage.getItem("color-theme");
          mode = localStorage.getItem("color-mode");
        } catch {}
        var resolved =
          mode === "light" || mode === "dark"
            ? mode
            : matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
        document.documentElement.setAttribute("data-color-theme", theme || "default");
        document.documentElement.setAttribute("data-mode", resolved);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
